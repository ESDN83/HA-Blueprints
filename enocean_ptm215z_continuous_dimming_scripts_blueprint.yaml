blueprint:
  name: EnOcean PTM 215Z - Dimmer + Szenen (v2)
  author: Claude for ESDN83
  description: >
    Friends-of-Hue / EnOcean PTM 215Z (Zigbee2MQTT).

    - Kurzdruck Taste 1 (oben links): zeitbasierte Szene anwenden (4 Zeitfenster konfigurierbar).
    - Kurzdruck Taste 3 (oben rechts): Szenen-Zyklus durch ausgewahlte Szenen.
    - Kurzdruck Taste 2 oder 4 (unten): Licht aus.
    - Halten Taste 1 oder 3: heller dimmen (continuous, brightness_move_onoff).
    - Halten Taste 2 oder 4: dunkler dimmen.
    - Loslassen: Dimmen stoppt.

    Komplett self-contained: keine externen Scripte notwendig.
    Picker fur Zyklus-Szenen und Zeit-Szenen direkt im Blueprint.
  domain: automation
  homeassistant:
    min_version: 2024.6.0

  input:
    mqtt_settings:
      name: MQTT / Controller
      icon: mdi:radio-tower
      input:
        base_topic:
          name: Zigbee2MQTT Base Topic
          description: Wie in Zigbee2MQTT konfiguriert, normalerweise "zigbee2mqtt".
          default: zigbee2mqtt
          selector:
            text:
        controller:
          name: Controller-Name (Z2M Friendly Name)
          description: Friendly Name des Schalters in Zigbee2MQTT, z.B. "Wohnzimmer_Switch".
          default: ""
          selector:
            text:
        light_zigbee2mqtt_name:
          name: Licht / Gruppe in Zigbee2MQTT
          description: >
            Friendly Name der Lampe oder Gruppe in Zigbee2MQTT (fur das Dimmen via MQTT).
            Z.B. "Wohnzimmer_Lampen".
          default: ""
          selector:
            text:
        light_entity:
          name: Licht-Entitat in Home Assistant
          description: Wird fur "Aus"-Aktion und Status verwendet.
          selector:
            entity:
              filter:
                - domain: light

    dimming:
      name: Dimm-Verhalten
      icon: mdi:brightness-6
      input:
        hold_delay:
          name: Hold-Erkennung
          description: Zeit in Millisekunden, ab der ein Druck als "Halten" gilt.
          default: 400
          selector:
            number:
              min: 100
              max: 1500
              step: 50
              unit_of_measurement: ms
        dim_speed:
          name: Dimm-Geschwindigkeit
          description: >
            Helligkeit-Einheiten pro Sekunde (Zigbee2MQTT brightness_move_onoff).
            50 = langsam, 150 = mittel, 254 = sehr schnell.
          default: 180
          selector:
            number:
              min: 10
              max: 254
              step: 10
        release_timeout:
          name: Sicherheits-Timeout fur Release
          description: Falls kein Release empfangen wird, stoppt das Dimmen spatestens nach diesen Sekunden.
          default: 8
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: s

    time_based:
      name: Zeitbasiertes Licht (Taste 1 kurz)
      icon: mdi:clock-time-four-outline
      description: >
        Welche Szene wird bei kurzem Druck auf Taste 1 angewendet,
        abhangig von der aktuellen Uhrzeit?
      input:
        time_scene_night:
          name: Nacht-Szene (22:00 - 06:00)
          selector:
            entity:
              filter:
                - domain: scene
        time_scene_morning:
          name: Morgen-Szene (06:00 - 10:00)
          selector:
            entity:
              filter:
                - domain: scene
        time_scene_day:
          name: Tag-Szene (10:00 - 17:00)
          selector:
            entity:
              filter:
                - domain: scene
        time_scene_evening:
          name: Abend-Szene (17:00 - 22:00)
          selector:
            entity:
              filter:
                - domain: scene
        scene_transition:
          name: Szenen-Ubergang
          description: Dauer in Sekunden fur den Ubergang in die Szene.
          default: 1
          selector:
            number:
              min: 0
              max: 10
              step: 1
              unit_of_measurement: s

    scene_cycle:
      name: Szenen-Zyklus (Taste 3 kurz)
      icon: mdi:playlist-play
      description: >
        Reihenfolge der Szenen, die bei jedem kurzen Druck auf Taste 3 nacheinander geschaltet werden.
        Auswahl-Reihenfolge = Zyklus-Reihenfolge.
      input:
        cycle_scenes:
          name: Szenen-Liste
          description: Mindestens 2 Szenen auswahlen.
          selector:
            entity:
              filter:
                - domain: scene
              multiple: true
        cycle_counter:
          name: Counter-Helfer fur Zyklus-Position
          description: >
            Counter-Helfer der den aktuellen Index speichert. In HA unter
            Einstellungen -> Helfer -> Counter anlegen (Start 0, Schritt 1,
            Min 0, Max ggf. 100). Bestehender Counter z.B. counter.wohnzimmer_szene_index.
          selector:
            entity:
              filter:
                - domain: counter

mode: restart
max_exceeded: silent

trigger_variables:
  base_topic: !input base_topic
  controller: !input controller

triggers:
  - trigger: mqtt
    topic: "{{ base_topic ~ '/' ~ controller }}"
    id: switch_json

conditions:
  - condition: template
    value_template: >
      {% set pj = trigger.payload_json | default({}) %}
      {% set action = (pj.action if pj is mapping else '') | default('') %}
      {{ action in ['press_1','press_2','press_3','press_4'] }}

variables:
  base_topic: !input base_topic
  controller: !input controller
  light_zigbee2mqtt_name: !input light_zigbee2mqtt_name
  hold_delay: !input hold_delay
  dim_speed: !input dim_speed
  release_timeout: !input release_timeout
  scene_transition: !input scene_transition
  cycle_scenes: !input cycle_scenes
  cycle_counter: !input cycle_counter
  time_scene_morning: !input time_scene_morning
  time_scene_day: !input time_scene_day
  time_scene_evening: !input time_scene_evening
  time_scene_night: !input time_scene_night

actions:
  - variables:
      action: "{{ trigger.payload_json.action }}"
      button: "{{ (action | regex_replace('^press_', '')) | int(0) }}"
      release_action: "release_{{ button }}"
      dim_direction: "{{ 1 if button in [1, 3] else -1 }}"
      dim_value: "{{ (dim_speed | int) * dim_direction }}"
      light_set_topic: "{{ base_topic ~ '/' ~ light_zigbee2mqtt_name ~ '/set' }}"

  # Warten ob Release vor hold_delay kommt -> Kurzdruck, sonst -> Halten
  - wait_for_trigger:
      - trigger: mqtt
        topic: "{{ base_topic ~ '/' ~ controller }}"
        value_template: "{{ value_json.action | default('') == release_action }}"
    timeout:
      milliseconds: !input hold_delay
    continue_on_timeout: true

  - choose:
      # ----- KURZDRUCK -----
      - alias: Kurzdruck erkannt
        conditions:
          - condition: template
            value_template: "{{ wait.trigger is not none }}"
        sequence:
          - choose:
              # Taste 1 kurz: zeitbasierte Szene
              - alias: Taste 1 - zeitbasierte Szene
                conditions:
                  - condition: template
                    value_template: "{{ button == 1 }}"
                sequence:
                  - choose:
                      - alias: Nacht 22:00 - 06:00
                        conditions:
                          - condition: or
                            conditions:
                              - condition: time
                                after: "22:00:00"
                              - condition: time
                                before: "06:00:00"
                        sequence:
                          - action: scene.turn_on
                            target:
                              entity_id: !input time_scene_night
                            data:
                              transition: !input scene_transition
                      - alias: Morgen 06:00 - 10:00
                        conditions:
                          - condition: time
                            after: "06:00:00"
                            before: "10:00:00"
                        sequence:
                          - action: scene.turn_on
                            target:
                              entity_id: !input time_scene_morning
                            data:
                              transition: !input scene_transition
                      - alias: Tag 10:00 - 17:00
                        conditions:
                          - condition: time
                            after: "10:00:00"
                            before: "17:00:00"
                        sequence:
                          - action: scene.turn_on
                            target:
                              entity_id: !input time_scene_day
                            data:
                              transition: !input scene_transition
                    default:
                      - action: scene.turn_on
                        target:
                          entity_id: !input time_scene_evening
                        data:
                          transition: !input scene_transition

              # Taste 2 kurz: Licht aus
              - alias: Taste 2 - Licht aus
                conditions:
                  - condition: template
                    value_template: "{{ button == 2 }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: !input light_entity

              # Taste 3 kurz: Szenen-Zyklus
              - alias: Taste 3 - Szenen-Zyklus
                conditions:
                  - condition: template
                    value_template: "{{ button == 3 and (cycle_scenes | length) > 0 }}"
                sequence:
                  - variables:
                      cycle_len: "{{ cycle_scenes | length }}"
                      cycle_index: "{{ states(cycle_counter) | int(0) % cycle_len }}"
                      next_scene: "{{ cycle_scenes[cycle_index | int] }}"
                  - action: scene.turn_on
                    data:
                      entity_id: "{{ next_scene }}"
                      transition: !input scene_transition
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ (states(cycle_counter) | int(0)) >= (cycle_len | int) - 1 }}"
                        sequence:
                          - action: counter.set_value
                            target:
                              entity_id: !input cycle_counter
                            data:
                              value: 0
                    default:
                      - action: counter.increment
                        target:
                          entity_id: !input cycle_counter

              # Taste 4 kurz: Licht aus
              - alias: Taste 4 - Licht aus
                conditions:
                  - condition: template
                    value_template: "{{ button == 4 }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: !input light_entity

    # ----- HALTEN: Dimmen starten -----
    default:
      - alias: Halten - Dimmen starten (UP nutzt _onoff, DOWN nicht)
        action: mqtt.publish
        data:
          topic: "{{ light_set_topic }}"
          payload: >-
            {% if dim_direction == 1 %}
            {"brightness_move_onoff": {{ dim_value }}}
            {% else %}
            {"brightness_move": {{ dim_value }}}
            {% endif %}

      - alias: Auf Release warten
        wait_for_trigger:
          - trigger: mqtt
            topic: "{{ base_topic ~ '/' ~ controller }}"
            value_template: "{{ value_json.action | default('') == release_action }}"
        timeout:
          seconds: !input release_timeout
        continue_on_timeout: true

      - alias: Dimmen stoppen
        action: mqtt.publish
        data:
          topic: "{{ light_set_topic }}"
          payload: '{"brightness_move": "stop"}'
